<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>争议调解 - 人社服务数字化平台</title>
  <!-- Font Awesome图标库 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- 防止闪烁：在页面渲染前立即设置主题 -->
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 页面内容 -->
<div class="page-content">
  <div class="container">
    
    <!-- 页面标题 -->
    <div class="section-header mb-32">
      <h2>线上服务争议调解机制</h2>
      <p>争议申请受理、线上调解流程、电子协议签署</p>
    </div>

    <!-- 争议申请与受理 -->
    <div class="card mb-24 p-24">
      <h3 class="mb-16">争议申请与受理</h3>
      <div class="row">
        <div class="col-4">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">📝</div>
              <div class="card-content">
                <h4>争议申请</h4>
                <p class="text-small">在线提交申请，填写详情，上传证据，选择调解方式</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-4">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">✅</div>
              <div class="card-content">
                <h4>申请审核</h4>
                <p class="text-small">人社部门审核真实性，驳回不符申请并说明理由</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-4">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">👨⚖️</div>
              <div class="card-content">
                <h4>调解员分配</h4>
                <p class="text-small">AI根据争议类型、所在地智能分配调解员</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="mt-24 text-center">
        <button class="btn btn-primary">申请争议调解</button>
      </div>
    </div>

    <!-- 线上调解流程 -->
    <div class="card p-24">
      <h3 class="mb-16">线上调解流程</h3>
      <div class="row">
        <div class="col-3">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">📢</div>
              <div class="card-content">
                <h4>调解通知</h4>
                <p class="text-small">自动发送通知，告知调解时间、入口</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-3">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">💻</div>
              <div class="card-content">
                <h4>线上调解</h4>
                <p class="text-small">视频/文字调解，上传补充证据，全程记录</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-3">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">📄</div>
              <div class="card-content">
                <h4>调解协议</h4>
                <p class="text-small">在线签署电子协议，具备法律效力</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-3">
          <div class="feature-card">
            <div class="card-header">
              <div class="icon">🗃️</div>
              <div class="card-content">
                <h4>调解归档</h4>
                <p class="text-small">自动归档记录、协议、证据，支持查询</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

  <script src="assets/theme-switch.js"></script>
</body>
</html>
