<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调解仲裁服务 - 人社服务数字化平台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* SPA 容器样式 */
    .spa-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* 顶部导航区 */
    .spa-header {
      flex-shrink: 0;
      background: white;
      border-bottom: 1px solid var(--border-color);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      z-index: 100;
    }

    /* iframe 内容区 */
    .spa-content {
      flex: 1;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    #content-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="spa-container">
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">人社服务数字平台</a>
      <div style="display: flex; align-items: center; gap: 12px;">
        <select class="form-select" style="width: auto; padding: 8px 32px 8px 12px;" id="role-select" onchange="loadRole(this.value)">
          <option value="arbitration" selected>⚖ 仲裁机构端</option>
          <option value="laborer">👷 劳动者端</option>
          <option value="employer">🏢 用人单位端</option>
          <option value="supervisor">📊 人社监管端</option>
          <option value="legal-aid">🤝 法律援助端</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="spa-content">
    <iframe id="content-frame" src="14a-arbitration.html" frameborder="0"></iframe>
  </main>
</div>

<script>
  // 角色与页面映射
  const ROLE_PAGES = {
    'laborer': '14c-laborer.html',
    'employer': '14b-employer.html',
    'arbitration': '14a-arbitration.html',
    'supervisor': '14e-supervisor.html',
    'legal-aid': '14d-legal-aid.html'
  };

  // 角色显示名称（用于选中状态）
  const ROLE_LABELS = {
    'laborer': '👷 劳动者端',
    'employer': '🏢 用人单位端',
    'arbitration': '⚖ 仲裁机构端',
    'supervisor': '📊 人社监管端',
    'legal-aid': '🤝 法律援助端'
  };

  // 当前角色
  let currentRole = 'arbitration';

  // 加载角色页面
  function loadRole(role) {
    if (!role || !ROLE_PAGES[role]) return;
    
    currentRole = role;
    document.getElementById('content-frame').src = ROLE_PAGES[role];
    
    // 更新下拉框选中状态（保留显示）
    document.getElementById('role-select').value = role;
  }

  // 从 iframe 内调用切换角色
  window.switchToRole = function(role) {
    if (role && ROLE_PAGES[role]) {
      document.getElementById('role-select').value = role;
      loadRole(role);
    }
  };

  // 页面加载完成后初始化
  document.addEventListener('DOMContentLoaded', function() {
    // 检查 URL 参数
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role');
    
    if (role && ROLE_PAGES[role]) {
      // URL 参数指定了角色
      currentRole = role;
      document.getElementById('role-select').value = role;
      document.getElementById('content-frame').src = ROLE_PAGES[role];
    } else {
      // 默认加载劳动者端
      document.getElementById('role-select').value = 'arbitration';
    }
  });
</script>

</body>
</html>
