<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调解仲裁服务 - 人社服务数字化平台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* SPA 容器样式 */
    .spa-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* 顶部导航区 */
    .spa-header {
      flex-shrink: 0;
      background: white;
      border-bottom: 1px solid var(--border-color);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      z-index: 100;
    }

    .spa-header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .spa-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spa-logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary) 0%, #722ed1 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }

    .spa-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      padding-left: 24px;
      border-left: 1px solid var(--border-color);
    }

    .spa-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .role-select-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .role-select-wrapper label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .role-select {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      background: white;
      cursor: pointer;
      min-width: 140px;
      transition: all 0.3s ease;
    }

    .role-select:hover {
      border-color: var(--primary);
    }

    .role-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
    }

    /* iframe 内容区 */
    .spa-content {
      flex: 1;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    #content-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 角色说明 */
    .role-hint {
      font-size: 13px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>

<div class="spa-container">
  <header class="spa-header">
    <div class="spa-header-left">
      <a href="index.html" class="spa-logo">
        <span class="spa-logo-icon">⚖</span>
        <span>人社服务数字平台</span>
      </a>
      <div class="spa-title">调解仲裁服务</div>
    </div>
    <div class="spa-header-right">
      <div class="role-select-wrapper">
        <label for="role-select">当前角色：</label>
        <select id="role-select" class="role-select" onchange="loadRole(this.value)">
          <option value="">选择角色进入工作台</option>
          <option value="laborer">👷 劳动者端</option>
          <option value="employer">🏢 用人单位端</option>
          <option value="arbitration">⚖ 仲裁机构端</option>
          <option value="supervisor">📊 人社监管端</option>
          <option value="legal-aid">🤝 法律援助端</option>
        </select>
      </div>
      <span class="role-hint">选择角色后进入对应工作台</span>
    </div>
  </header>

  <main class="spa-content">
    <iframe id="content-frame" src="14c-laborer.html" frameborder="0"></iframe>
  </main>
</div>

<script>
  // 角色与页面映射
  const ROLE_PAGES = {
    'laborer': '14c-laborer.html',
    'employer': '14b-employer.html',
    'arbitration': '14a-arbitration.html',
    'supervisor': '14e-supervisor.html',
    'legal-aid': '14d-legal-aid.html'
  };

  // 角色显示名称（用于选中状态）
  const ROLE_LABELS = {
    'laborer': '👷 劳动者端',
    'employer': '🏢 用人单位端',
    'arbitration': '⚖ 仲裁机构端',
    'supervisor': '📊 人社监管端',
    'legal-aid': '🤝 法律援助端'
  };

  // 当前角色
  let currentRole = 'laborer';

  // 加载角色页面
  function loadRole(role) {
    if (!role || !ROLE_PAGES[role]) return;
    
    currentRole = role;
    document.getElementById('content-frame').src = ROLE_PAGES[role];
    
    // 更新下拉框选中状态（保留显示）
    document.getElementById('role-select').value = role;
  }

  // 从 iframe 内调用切换角色
  window.switchToRole = function(role) {
    if (role && ROLE_PAGES[role]) {
      document.getElementById('role-select').value = role;
      loadRole(role);
    }
  };

  // 页面加载完成后初始化
  document.addEventListener('DOMContentLoaded', function() {
    // 检查 URL 参数
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role');
    
    if (role && ROLE_PAGES[role]) {
      // URL 参数指定了角色
      currentRole = role;
      document.getElementById('role-select').value = role;
      document.getElementById('content-frame').src = ROLE_PAGES[role];
    } else {
      // 默认加载劳动者端
      document.getElementById('role-select').value = 'laborer';
    }
  });
</script>

</body>
</html>
